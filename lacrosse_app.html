<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lacrosse">
<meta name="theme-color" content="#0a0a0a">
<title>Lacrosse Off-Season</title>
<style>
  :root {
    --green:  #4ade80;
    --orange: #f97316;
    --purple: #a78bfa;
    --blue:   #60a5fa;
    --gray:   #6b7280;
    --bg:     #0a0a0a;
    --bg2:    #111;
    --bg3:    #181818;
    --border: #222;
    --text:   #e5e5e5;
    --muted:  #555;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
    user-select: none;
  }

  /* ── SCREENS ─────────────────────────────────── */
  .screen { display: none; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }
  .screen.active { display: flex; }

  /* ── HOME SCREEN ─────────────────────────────── */
  #screen-home {
    padding: calc(var(--safe-top) + 48px) 24px calc(var(--safe-bot) + 32px);
    background: var(--bg);
  }

  .home-eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .home-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .home-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .phase-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  .phase-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .phase-card:active { transform: scale(0.98); }

  .phase-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .phase-name { font-size: 11px; font-weight: bold; letter-spacing: 3px; }
  .phase-weeks { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .phase-subtitle { font-size: 17px; font-weight: bold; margin-bottom: 6px; }
  .phase-desc { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
  .phase-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .phase-tag { font-size: 9px; padding: 3px 8px; letter-spacing: 1px; border-radius: 3px; }
  .phase-arrow {
    font-size: 18px;
    color: var(--muted);
    padding-top: 2px;
  }

  /* ── PLAN SCREEN ─────────────────────────────── */
  #screen-plan {
    background: var(--bg);
  }

  .plan-header {
    padding: calc(var(--safe-top) + 16px) 20px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    font-family: inherit;
    line-height: 1;
  }
  .plan-header-text { flex: 1; }
  .plan-header-phase { font-size: 10px; letter-spacing: 3px; font-weight: bold; }
  .plan-header-sub { font-size: 13px; color: var(--muted); }

  /* Day scroll */
  .day-scroll {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    -webkit-overflow-scrolling: touch;
  }
  .day-scroll::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    min-width: 52px;
  }
  .day-btn .db-name { font-weight: bold; display: block; font-size: 12px; }
  .day-btn .db-type { display: block; font-size: 8px; margin-top: 2px; opacity: 0.7; }

  /* Exercise list */
  .plan-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px calc(var(--safe-bot) + 100px);
    -webkit-overflow-scrolling: touch;
  }

  .day-label-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .type-chip {
    font-size: 9px;
    padding: 4px 10px;
    letter-spacing: 2px;
    border-radius: 4px;
    font-weight: bold;
  }
  .day-full-label { font-size: 16px; font-weight: bold; }

  .session-block { margin-bottom: 24px; }
  .session-title {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 10px;
    padding-left: 10px;
    border-left: 2px solid #333;
  }

  .ex-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ex-card:active { background: #181818; }

  .ex-num {
    font-size: 10px;
    color: #333;
    min-width: 20px;
    font-weight: bold;
  }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: bold; color: #ddd; }
  .ex-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .ex-sets {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    text-align: right;
  }

  /* Start button fixed */
  .start-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px calc(var(--safe-bot) + 14px);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .start-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
  }
  .start-btn:active { transform: scale(0.97); opacity: 0.85; }

  /* ── WORKOUT SCREEN ──────────────────────────── */
  #screen-workout {
    background: var(--bg);
  }

  .workout-header {
    padding: calc(var(--safe-top) + 14px) 20px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .workout-progress-text {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    flex: 1;
    text-align: center;
  }

  /* Progress bar */
  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
  }
  .progress-bar-fill {
    height: 100%;
    transition: width 0.4s ease;
  }

  .workout-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .wk-session-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .wk-ex-name {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    color: #fff;
  }
  .wk-sets-big {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .wk-sets-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .wk-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    padding: 12px 14px;
    background: var(--bg2);
    border-radius: 8px;
    border-left: 2px solid #333;
    margin-bottom: 24px;
  }

  /* Next up */
  .next-up {
    margin-top: auto;
    padding: 14px 16px;
    background: var(--bg2);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .next-up-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 4px; }
  .next-up-name { font-size: 13px; font-weight: bold; color: #aaa; }

  /* Nav buttons */
  .workout-nav {
    display: flex;
    gap: 10px;
    padding: 0 24px calc(var(--safe-bot) + 24px);
  }
  .nav-btn {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn.primary {
    flex: 2;
    border-color: transparent;
    color: #000;
    font-size: 13px;
  }

  /* ── TIMER SCREEN ────────────────────────────── */
  #screen-timer {
    background: var(--bg);
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
  }

  .timer-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .timer-display {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }
  .timer-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 48px;
  }

  .timer-ring-wrap {
    position: relative;
    margin: 0 auto 40px;
    width: 180px; height: 180px;
  }
  .timer-ring {
    transform: rotate(-90deg);
    position: absolute;
    top: 0; left: 0;
  }
  .timer-ring-bg { fill: none; stroke: #1a1a1a; stroke-width: 8; }
  .timer-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

  .timer-big {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }

  .timer-presets {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .preset-btn {
    flex: 1;
    padding: 12px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.12s;
  }
  .preset-btn:active { transform: scale(0.95); }
  .preset-btn.active-preset { color: #000; }

  .timer-controls { display: flex; gap: 10px; width: 100%; }
  .timer-ctrl-btn {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .timer-ctrl-btn:active { transform: scale(0.97); }
  .timer-ctrl-btn.big { flex: 2; color: #000; border: none; }

  .timer-skip {
    margin-top: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    padding: 10px;
  }

  /* ── DONE SCREEN ─────────────────────────────── */
  #screen-done {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px calc(var(--safe-bot) + 40px);
    background: var(--bg);
  }
  .done-icon { font-size: 64px; margin-bottom: 24px; }
  .done-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px; }
  .done-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-bottom: 40px; }
  .done-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 48px;
  }
  .done-stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    flex: 1;
  }
  .done-stat-val { font-size: 28px; font-weight: 900; }
  .done-stat-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .done-home-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
  }

  /* ── UTILS ───────────────────────────────────── */
  .fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-eyebrow">OFF-SEASON</div>
  <div class="home-title">LACROSSE<br>TRAINING</div>
  <div class="home-sub">12 SETTIMANE · 5–6 GG/SETT</div>
  <div id="phase-list"></div>
</div>

<!-- PLAN (days + exercises list) -->
<div id="screen-plan" class="screen">
  <div class="plan-header">
    <button class="back-btn" onclick="showHome()">‹</button>
    <div class="plan-header-text">
      <div class="plan-header-phase" id="plan-phase-name"></div>
      <div class="plan-header-sub" id="plan-phase-sub"></div>
    </div>
  </div>
  <div class="day-scroll" id="day-scroll"></div>
  <div class="plan-body" id="plan-body"></div>
  <div class="start-bar">
    <button class="start-btn" id="start-btn" onclick="startWorkout()">▶ INIZIA ALLENAMENTO</button>
  </div>
</div>

<!-- WORKOUT (exercise by exercise) -->
<div id="screen-workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="showPlan()">‹</button>
    <div class="workout-progress-text" id="wk-progress-text"></div>
    <button class="back-btn" onclick="showTimer()" style="font-size:16px">⏱</button>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
  <div class="workout-body" id="workout-body"></div>
  <div class="workout-nav">
    <button class="nav-btn" onclick="prevExercise()">‹ PREV</button>
    <button class="nav-btn primary" id="next-btn" onclick="nextExercise()">PROSSIMO ›</button>
  </div>
</div>

<!-- TIMER -->
<div id="screen-timer" class="screen">
  <div class="timer-label">RECUPERO</div>

  <div class="timer-ring-wrap">
    <svg class="timer-ring" width="180" height="180" viewBox="0 0 180 180">
      <circle class="timer-ring-bg" cx="90" cy="90" r="82"/>
      <circle class="timer-ring-fill" id="ring-fill" cx="90" cy="90" r="82"
        stroke-dasharray="515" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-big" id="timer-big">1:30</div>
  </div>

  <div class="timer-presets">
    <button class="preset-btn" onclick="setTimer(60)">1 min</button>
    <button class="preset-btn" onclick="setTimer(90)">1:30</button>
    <button class="preset-btn" onclick="setTimer(120)">2 min</button>
    <button class="preset-btn" onclick="setTimer(180)">3 min</button>
  </div>

  <div class="timer-controls">
    <button class="timer-ctrl-btn" onclick="resetTimer()">RESET</button>
    <button class="timer-ctrl-btn big" id="timer-play-btn" onclick="toggleTimer()">▶ START</button>
  </div>
  <button class="timer-skip" onclick="showWorkout()">← torna all'esercizio</button>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="done-icon">🏆</div>
  <div class="done-title" id="done-title">FATTO!</div>
  <div class="done-sub">ALLENAMENTO COMPLETATO</div>
  <div class="done-stats">
    <div class="done-stat">
      <div class="done-stat-val" id="done-ex-count">0</div>
      <div class="done-stat-label">ESERCIZI</div>
    </div>
    <div class="done-stat">
      <div class="done-stat-val" id="done-time">0'</div>
      <div class="done-stat-label">MINUTI</div>
    </div>
  </div>
  <button class="done-home-btn" onclick="showHome()">← TORNA AL PIANO</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const phases = [
  {
    name: "FASE 1", subtitle: "Base & Condizionamento",
    weeks: "Settimane 1–4", color: "#4ade80",
    focus: ["Endurance aerobica", "Forza base", "Tecnica"],
    description: "Costruisci il motore. Nessuna esplosività prima di avere una base solida.",
    days: [
      { day: "LUN", label: "Forza Base", type: "strength",
        sessions: [{ name: "Forza — Lower Body", exercises: [
          { name: "Squat", sets: "4×8", note: "carico moderato, focus tecnica" },
          { name: "Romanian Deadlift", sets: "3×10", note: "bilanciere o manubri" },
          { name: "Step-up con manubri", sets: "3×10/gamba", note: "" },
          { name: "Plank laterale", sets: "3×30s", note: "" },
        ]}]},
      { day: "MAR", label: "Endurance + Tecnica", type: "endurance",
        sessions: [
          { name: "Endurance Continua", exercises: [
            { name: "Corsa continua Z2", sets: "30–35 min", note: "130–150 bpm" },
          ]},
          { name: "Tecnica", exercises: [
            { name: "Wall ball — mano debole", sets: "200 rip", note: "" },
            { name: "Cradle + movimento laterale", sets: "5×1 min", note: "" },
          ]},
        ]},
      { day: "MER", label: "Forza Upper + Core", type: "strength",
        sessions: [{ name: "Upper Body & Core", exercises: [
          { name: "Push-up (varianti)", sets: "4×12", note: "" },
          { name: "Row con manubri", sets: "4×10", note: "" },
          { name: "Overhead press", sets: "3×10", note: "" },
          { name: "Dead bug", sets: "3×10", note: "" },
          { name: "Pallof press", sets: "3×12", note: "se hai elastico" },
        ]}]},
      { day: "GIO", label: "Endurance Intervallata", type: "endurance",
        sessions: [{ name: "Interval Run", exercises: [
          { name: "Riscaldamento", sets: "10 min jogging", note: "" },
          { name: "6×3 min ritmo sostenuto", sets: "rec 90s", note: "~75–80% FCmax" },
          { name: "Defaticamento", sets: "10 min", note: "" },
        ]}]},
      { day: "VEN", label: "Tecnica + Mobilità", type: "technique",
        sessions: [
          { name: "Sessione Tecnica", exercises: [
            { name: "Shooting — quick release", sets: "150 tiri", note: "lavora il finishing ravvicinato" },
            { name: "Dodge sequenze (split, roll)", sets: "10 min", note: "" },
            { name: "Ground ball pickup", sets: "5 min", note: "" },
          ]},
          { name: "Mobilità", exercises: [
            { name: "Hip flexor + glute stretch", sets: "2×60s", note: "" },
            { name: "Thoracic rotation", sets: "2×10/lato", note: "" },
            { name: "Foam rolling gambe", sets: "10 min", note: "" },
          ]},
        ]},
      { day: "SAB", label: "Riposo Attivo", type: "rest",
        sessions: [{ name: "Recupero", exercises: [
          { name: "Camminata o ciclismo leggero", sets: "30–45 min", note: "Z1 — recupero attivo" },
          { name: "Stretching globale", sets: "15 min", note: "" },
        ]}]},
    ],
  },
  {
    name: "FASE 2", subtitle: "Forza Esplosiva & Potenza",
    weeks: "Settimane 5–8", color: "#f97316",
    focus: ["Pliometria", "Forza esplosiva", "Endurance lattacida"],
    description: "Trasforma la base in esplosività. Aggiungi pliometria e alzate esplosive.",
    days: [
      { day: "LUN", label: "Esplosiva Lower", type: "strength",
        sessions: [{ name: "Lower Body Potenza", exercises: [
          { name: "Squat Jump", sets: "4×6", note: "massima elevazione" },
          { name: "Box Jump", sets: "4×5", note: "scendi con controllo" },
          { name: "Squat con manubri", sets: "4×6", note: "@alta intensità" },
          { name: "Bulgarian split squat", sets: "3×8/gamba", note: "" },
          { name: "Glute bridge esplosivo", sets: "3×10", note: "" },
        ]}]},
      { day: "MAR", label: "Endurance + Tecnica", type: "endurance",
        sessions: [
          { name: "Interval Lattacido", exercises: [
            { name: "Riscaldamento", sets: "10 min", note: "" },
            { name: "8×1 min sprint", sets: "rec 1 min", note: "90%+ FCmax" },
            { name: "Defaticamento", sets: "10 min", note: "" },

const typeColors = {
  strength:  { bg: "#1a2a1a", accent: "#4ade80", label: "FORZA" },
  endurance: { bg: "#1a1a2e", accent: "#60a5fa", label: "ENDURANCE" },
  plyo:      { bg: "#2a1a10", accent: "#f97316", label: "PLIOMETRIA" },
  technique: { bg: "#1e1a2a", accent: "#a78bfa", label: "TECNICA" },
  rest:      { bg: "#1a1a1a", accent: "#6b7280", label: "RIPOSO" },
};

// ── STATE ─────────────────────────────────────────────────────────────
let currentPhase = 0;
let currentDay = 0;
let allExercises = []; // flat list for workout mode
let currentExIdx = 0;
let workoutStartTime = null;

// Timer state
let timerDuration = 90;
let timerRemaining = 90;
let timerInterval = null;
let timerRunning = false;

// ── SCREEN NAVIGATION ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  el.classList.add('active');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
}

function showHome() {
  stopTimer();
  showScreen('home');
}
function showPlan() { showScreen('plan'); }
function showWorkout() { showScreen('workout'); }
function showTimer() { showScreen('timer'); }

// ── HOME ──────────────────────────────────────────────────────────────
function renderHome() {
  const list = document.getElementById('phase-list');
  list.innerHTML = phases.map((p, pi) => `
    <div class="phase-card" onclick="openPhase(${pi})"
      style="border-color:${p.color}22">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${p.color};border-radius:3px 0 0 3px"></div>
      <div class="phase-card-top">
        <div>
          <div class="phase-name" style="color:${p.color}">${p.name} · ${p.weeks}</div>
          <div class="phase-subtitle" style="margin-top:6px">${p.subtitle}</div>
        </div>
        <div class="phase-arrow">›</div>
      </div>
      <div class="phase-desc">${p.description}</div>
      <div class="phase-tags">
        ${p.focus.map(f => `<span class="phase-tag" style="background:${p.color}18;color:${p.color}">${f}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// ── PLAN ──────────────────────────────────────────────────────────────
function openPhase(pi) {
  currentPhase = pi;
  currentDay = 0;
  renderPlan();
  showScreen('plan');
}

function renderPlan() {
  const phase = phases[currentPhase];
  document.getElementById('plan-phase-name').textContent = phase.name;
  document.getElementById('plan-phase-name').style.color = phase.color;
  document.getElementById('plan-phase-sub').textContent = phase.subtitle;

  // Day tabs
  const scroll = document.getElementById('day-scroll');
  scroll.innerHTML = phase.days.map((d, i) => {
    const tc = typeColors[d.type];
    return `<button class="day-btn" onclick="selectDay(${i})"
      id="daybtn-${i}"
      style="background:${i===currentDay?tc.bg:'transparent'};
             border-color:${i===currentDay?tc.accent:'#222'};
             color:${i===currentDay?tc.accent:'#555'}">
      <span class="db-name">${d.day}</span>
      <span class="db-type">${tc.label}</span>
    </button>`;
  }).join('');

  renderDayBody();

  const tc = typeColors[phase.days[currentDay].type];
  const btn = document.getElementById('start-btn');
  btn.style.background = tc.accent;
  btn.style.color = '#000';
}

function selectDay(i) {
  currentDay = i;
  renderPlan();
  // scroll day btn into view
  setTimeout(() => {
    const btn = document.getElementById('daybtn-' + i);
    if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

function renderDayBody() {
  const phase = phases[currentPhase];
  const day = phase.days[currentDay];
  const tc = typeColors[day.type];

  let html = `<div class="day-label-row">
    <span class="type-chip" style="background:${tc.accent}22;color:${tc.accent}">${tc.label}</span>
    <span class="day-full-label">${day.label}</span>
  </div>`;

  day.sessions.forEach(session => {
    html += `<div class="session-block">
      <div class="session-title" style="border-color:${tc.accent}55">${session.name}</div>`;
    session.exercises.forEach((ex, ei) => {
      html += `<div class="ex-card" style="border-color:#1e1e1e">
        <span class="ex-num" style="color:${tc.accent}55">${String(ei+1).padStart(2,'0')}</span>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        </div>
        <span class="ex-sets" style="color:${tc.accent}">${ex.sets}</span>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('plan-body').innerHTML = html;
}

// ── WORKOUT MODE ──────────────────────────────────────────────────────
function startWorkout() {
  const phase = phases[currentPhase];
  const day = phase.days[currentDay];

  // Flatten exercises from all sessions
  allExercises = [];
  day.sessions.forEach(session => {
    session.exercises.forEach(ex => {
      allExercises.push({ ...ex, sessionName: session.name });
    });
  });

  currentExIdx = 0;
  workoutStartTime = Date.now();
  renderWorkoutExercise();
  showScreen('workout');
}

function renderWorkoutExercise() {
  const phase = phases[currentPhase];
  const day = phase.days[currentDay];
  const tc = typeColors[day.type];
  const ex = allExercises[currentExIdx];
  const total = allExercises.length;
  const isLast = currentExIdx === total - 1;

  // Progress
  const pct = ((currentExIdx) / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-bar').style.background = tc.accent;
  document.getElementById('wk-progress-text').textContent =
    `${currentExIdx + 1} / ${total}`;

  // Next exercise
  const nextEx = allExercises[currentExIdx + 1];
  const nextHtml = nextEx
    ? `<div class="next-up">
        <div class="next-up-label">PROSSIMO</div>
        <div class="next-up-name">${nextEx.name}${nextEx.sets ? ' · ' + nextEx.sets : ''}</div>
      </div>`
    : `<div class="next-up" style="border-color:${tc.accent}44">
        <div class="next-up-label" style="color:${tc.accent}">ULTIMO ESERCIZIO</div>
        <div class="next-up-name" style="color:${tc.accent}">Poi hai finito 💪</div>
      </div>`;

  document.getElementById('workout-body').innerHTML = `
    <div class="wk-session-label">${ex.sessionName}</div>
    <div class="wk-ex-name">${ex.name}</div>
    ${ex.sets ? `<div class="wk-sets-big" style="color:${tc.accent}">${ex.sets}</div>
    <div class="wk-sets-label">SERIE / REPS</div>` : ''}
    ${ex.note ? `<div class="wk-note">${ex.note}</div>` : ''}
    ${nextHtml}
  `;

  // Next button
  const nextBtn = document.getElementById('next-btn');
  if (isLast) {
    nextBtn.textContent = 'FINITO ✓';
    nextBtn.style.background = tc.accent;
  } else {
    nextBtn.textContent = 'PROSSIMO ›';
    nextBtn.style.background = tc.accent;
  }
  nextBtn.style.color = '#000';
}

function nextExercise() {
  if (currentExIdx < allExercises.length - 1) {
    currentExIdx++;
    renderWorkoutExercise();
  } else {
    finishWorkout();
  }
}

function prevExercise() {
  if (currentExIdx > 0) {
    currentExIdx--;
    renderWorkoutExercise();
  }
}

function finishWorkout() {
  const elapsed = Math.round((Date.now() - workoutStartTime) / 60000);
  document.getElementById('done-ex-count').textContent = allExercises.length;
  document.getElementById('done-time').textContent = elapsed + "'";

  const phase = phases[currentPhase];
  const day = phase.days[currentDay];
  document.getElementById('done-title').textContent = day.day + ' — FATTO!';

  showScreen('done');
}

// ── TIMER ─────────────────────────────────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 82; // r=82

function setTimer(seconds) {
  stopTimer();
  timerDuration = seconds;
  timerRemaining = seconds;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  const display = m + ':' + String(s).padStart(2, '0');
  document.getElementById('timer-big').textContent = display;

  // Ring
  const pct = timerRemaining / timerDuration;
  const offset = CIRCUMFERENCE * (1 - pct);
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = offset;
}

function toggleTimer() {
  if (timerRunning) {
    stopTimer();
  } else {
    startTimerRun();
  }
}

function startTimerRun() {
  if (timerRemaining <= 0) timerRemaining = timerDuration;
  timerRunning = true;
  document.getElementById('timer-play-btn').textContent = '⏸ PAUSA';

  // Color from current phase
  const phase = phases[currentPhase];
  document.getElementById('ring-fill').style.stroke = phase.color;
  document.getElementById('timer-play-btn').style.background = phase.color;

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      stopTimer();
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      document.getElementById('timer-play-btn').textContent = '▶ START';
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timer-play-btn').textContent = '▶ START';
}

function resetTimer() {
  stopTimer();
  timerRemaining = timerDuration;
  updateTimerDisplay();
}

// ── INIT ──────────────────────────────────────────────────────────────
renderHome();
setTimer(90);

// Set ring color initially
document.getElementById('ring-fill').style.stroke = '#4ade80';
const playBtn = document.getElementById('timer-play-btn');
playBtn.style.background = '#4ade80';
playBtn.style.color = '#000';
</script>
